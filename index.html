<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="/src/style.css" rel="stylesheet">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vite-tailwind-js-template</title>
  </head>
  <body>
    <main class="mx-auto max-w-lg p-6 space-y-6">

  <div class="space-y-2">
    <label class="block text-sm font-medium" for="sw-select">
      Choose a category
    </label>
    <select
      id="sw-select"
      class="w-full rounded border px-3 py-2 bg-white text-gray-900"
    >
      <option value="">-- Pick one --</option>
      <option value="planets">Planets</option>
      <option value="people">People</option>
      <option value="films">Films</option>
      <option value="species">Species</option>
      <option value="starships">Starships</option>
      <option value="vehicles">Vehicles</option>
    </select>
  </div>

  <output
  id="output"
  class="block min-h-[3rem] rounded border border-dashed border-gray-300 p-4 text-sm text-gray-500"
>
  Select a category above to load results.
</output>

</main>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
